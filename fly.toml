# Fly.io config. Single-instance by design: SQLite lives on the attached
# volume, so running >1 machine would fork the database. Keep min/max = 1.
#
# First-time setup:
#   fly launch --no-deploy           (creates the app, keep this file)
#   fly volumes create teahole_data --region <region> --size 1
#   fly secrets set JWT_SECRET=$(openssl rand -hex 32) \
#                   GMAIL_USER=you@gmail.com            \
#                   GMAIL_APP_PASSWORD='xxxx xxxx xxxx xxxx'
#   # (GMAIL_APP_PASSWORD is a 16-char app password from Google Account →
#   # Security → 2-Step Verification → App passwords, NOT your login password.)
#   # Seed the allowlist on the volume (one-shot):
#   fly ssh console -C 'sh -c "cat > /data/dept-allowlist.txt"' < dept-allowlist.txt
#   fly deploy
#
# Subsequent releases:
#   git commit ... && fly deploy

app = "teahole"
primary_region = "sin"  # Singapore; change to your nearest region (sea/sin/hkg).

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  TRUST_PROXY = "1"  # fly.io fronts the app with a proxy, so req.ip reads X-Forwarded-For.

[[mounts]]
  source = "teahole_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
